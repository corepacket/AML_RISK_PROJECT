services:
  ai:
    build:
      context: .
      dockerfile: Dockerfile.ai
    environment:
      # Set these in your .env (compose auto-loads it)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - MONGO_URI=${MONGO_URI}
    ports:
      - "8000:8000"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - MONGO_URI=${MONGO_URI}
      - PYTHON_AI_BASE_URL=http://ai:8000
    depends_on:
      - ai
    ports:
      - "5000:5000"

  ui:
    build:
      context: ./fraud_ui
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"

